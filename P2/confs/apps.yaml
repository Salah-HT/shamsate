apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: p2-host-routing
spec:
  ingressClassName: traefik
  rules:
    - host: app1.shamsates.iof
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: app-one
                port:
                  number: 80
    - host: app2.shamsates.iof
      http:
